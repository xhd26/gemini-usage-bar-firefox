<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient: Indigo to Violet to Magenta -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <!-- Sparkle Gradient: Glowing white/purple transition -->
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    
    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Premium Squircle Background -->
  <rect width="128" height="128" rx="36" fill="url(#bg-grad)" />

  <!-- Outer Customization/Progress Ring (representing Tweaks & Limits) -->
  <!-- Background Track -->
  <circle cx="64" cy="64" r="38" stroke="rgba(255, 255, 255, 0.15)" stroke-width="7" fill="none" />
  <!-- Progress Arch (about 70% full, clockwise starting from top) -->
  <path d="M 64 26 A 38 38 0 1 1 33.7 87.1" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#shadow)" />
  
  <!-- Mini adjustment tick/gear notch at the end of the arc -->
  <circle cx="33.7" cy="87.1" r="5" fill="#EC4899" stroke="#FFFFFF" stroke-width="2" filter="url(#shadow)" />

  <!-- Centered Gemini Sparkle Star -->
  <path d="M 64 42 C 64 54 54 64 42 64 C 54 64 64 74 64 86 C 64 74 74 64 86 64 C 74 64 64 54 64 42 Z" fill="url(#star-grad)" filter="url(#shadow)" />
</svg>
